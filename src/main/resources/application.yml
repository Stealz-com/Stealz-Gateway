server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AuthenticationFilter
      routes:
        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/api/products/**
        - id: product-service-docs
          uri: http://product-service:8081
          predicates:
            - Path=/product-service/v3/api-docs
          filters:
            - RewritePath=/product-service/(?<segment>.*), /$\{segment}

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**
        - id: order-service-docs
          uri: http://order-service:8082
          predicates:
            - Path=/order-service/v3/api-docs
          filters:
            - RewritePath=/order-service/(?<segment>.*), /$\{segment}

        - id: inventory-service
          uri: http://inventory-service:8083
          predicates:
            - Path=/api/inventory/**
        - id: inventory-service-docs
          uri: http://inventory-service:8083
          predicates:
            - Path=/inventory-service/v3/api-docs
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /$\{segment}

        - id: user-service
          uri: http://user-service:8084
          predicates:
            - Path=/api/users/**
        - id: user-service-auth
          uri: http://user-service:8084
          predicates:
            - Path=/api/auth/**
        - id: user-service-docs
          uri: http://user-service:8084
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}

        - id: review-service
          uri: http://review-service:8085
          predicates:
            - Path=/api/reviews/**
        - id: review-service-docs
          uri: http://review-service:8085
          predicates:
            - Path=/review-service/v3/api-docs
          filters:
            - RewritePath=/review-service/(?<segment>.*), /$\{segment}

        - id: notification-service
          uri: http://notification-service:8086
          predicates:
            - Path=/api/notifications/**
        - id: notification-service-docs
          uri: http://notification-service:8086
          predicates:
            - Path=/notification-service/v3/api-docs
          filters:
            - RewritePath=/notification-service/(?<segment>.*), /$\{segment}

  threads:
     virtual:
       enabled: true

springdoc:
  swagger-ui:
    urls:
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: inventory-service
        url: /inventory-service/v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs
      - name: review-service
        url: /review-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
